<!DOCTYPE html>
<html>
<head>
  <title>1991 Pit Scouting</title>
  <link rel="stylesheet" href="styles.css">
</head>

<label for="event">Event:</label>
<select id="event">
  <option value="">Select an event</option>
  <option value="2026mabil">2026 Minuteman</option>
  <option value="2026mawne">2026 Western NE</option>
  <option value="2026ctwat">2026 Waterbury</option>
  <option value="2026rikin">2026 URI</option>
  <option value="2026cthar">2026 Hartford</option>
</select>

  

<body class="dark-body">

  <div class="dark-card">
    <h1 class="form-title">Pit Scouting</h1>

    <form>

      <label class="form-label">Robot Height (inches)</label>
      <input class="form-input" type="number">

      <label class="form-label">Robot Width (inches)</label>
      <input class="form-input" type="number">

      <label class="form-label">Robot Length (inches)</label>
      <input class="form-input" type="number">

      <label class="form-label">Robot Drivebase Type</label>
      <select class="form-input">
        <option value="">Select drivebase type...</option>
        <option value="swerve">Swerve</option>
        <option value="tank">Tank</option>
        <option value="west_coast">West Coast</option>
        <option value="mecanum">Mecanum</option>
        <option value="other">Other</option>
</select>

      <label class="form-label">Robot Weight (lbs)</label>
      <input class="form-input" type="number">

      <label class="form-label">Drivetrain Type</label>
      <input class="form-input" type="text" placeholder="Swerve, Tank, West Coast...">

      <label class="form-label">Has Autonomous?</label>
      <div class="form-checkbox-row">
        <input type="checkbox">
        <span>Yes</span>
      </div>

      <label class="form-label">Can Climb?</label>
      <div class="form-checkbox-row">
        <input type="checkbox">
        <span>Yes</span>
      </div>

      <label class="form-label">Notes</label>
      <textarea class="form-textarea"></textarea>

      <button class="form-submit" type="submit">Submit</button>

    </form>
  </div>

</body>
</html>
